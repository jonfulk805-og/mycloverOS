# CloverStack Module: CloverMesh — WireGuard mesh networking (Netmaker)
services:
  netmaker-server:
    image: gravitl/netmaker:latest
    container_name: clovermesh-netmaker
    restart: unless-stopped
    environment:
      SERVER_NAME: ${MESH_SERVER_NAME:-clovermesh}
      SERVER_HOST: ${MESH_SERVER_HOST:-0.0.0.0}
      MASTER_KEY: ${MESH_MASTER_KEY:-cloverstack-mesh-key}
      DATABASE: sqlite
      MQ_HOST: clovermesh-mq
      DNS_MODE: "on"
    ports: ["8091:8081", "51821:51821/udp"]
    volumes:
      - clovermesh-data:/root/data
      - clovermesh-sqldata:/root/config/dnsconfig
    cap_add: [NET_ADMIN, SYS_MODULE]
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.forwarding=1
    networks: [cloverstack]
    labels:
      - "cloverstack.module=clovermesh"

  netmaker-mq:
    image: eclipse-mosquitto:2
    container_name: clovermesh-mq
    restart: unless-stopped
    volumes:
      - clovermesh-mq-data:/mosquitto/data
      - clovermesh-mq-logs:/mosquitto/log
    networks: [cloverstack]

  netmaker-ui:
    image: gravitl/netmaker-ui:latest
    container_name: clovermesh-ui
    restart: unless-stopped
    depends_on: [netmaker-server]
    environment:
      BACKEND_URL: "http://clovermesh-netmaker:8081"
    ports: ["8092:80"]
    networks: [cloverstack]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clovermesh.rule=PathPrefix(`/mesh`)"
      - "traefik.http.services.clovermesh.loadbalancer.server.port=80"

volumes:
  clovermesh-data:
  clovermesh-sqldata:
  clovermesh-mq-data:
  clovermesh-mq-logs:

networks:
  cloverstack: { external: true }
