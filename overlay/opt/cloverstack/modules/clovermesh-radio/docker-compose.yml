# CloverStack Module: CloverMesh Radio — LoRa mesh (Meshtastic)
services:
  meshtastic-web:
    image: ghcr.io/meshtastic/web:latest
    container_name: clovermesh-radio-web
    restart: unless-stopped
    environment:
      MESHTASTIC_HOST: ${RADIO_HOST:-host.docker.internal}
      MESHTASTIC_PORT: ${RADIO_PORT:-4403}
    ports: ["8093:8080"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [cloverstack]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meshradio.rule=PathPrefix(`/radio`)"
      - "traefik.http.services.meshradio.loadbalancer.server.port=8080"
      - "cloverstack.module=clovermesh-radio"

  meshtastic-mqtt:
    image: eclipse-mosquitto:2
    container_name: clovermesh-radio-mqtt
    restart: unless-stopped
    ports: ["1884:1883"]
    volumes:
      - clovermesh-radio-mqtt-data:/mosquitto/data
      - clovermesh-radio-mqtt-logs:/mosquitto/log
    networks: [cloverstack]

volumes:
  clovermesh-radio-mqtt-data:
  clovermesh-radio-mqtt-logs:

networks:
  cloverstack: { external: true }
