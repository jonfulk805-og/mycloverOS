name: Build & Release mycloverOS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to build'
        required: true
        default: 'server'
        type: choice
        options:
          - server
          - desktop
          - micro
          - kiosk
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 60

    steps:
      - name: Install system prerequisites
        run: |
          apt-get update
          apt-get install -y git nodejs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine edition
        id: edition
        run: |
          EDITION="${{ github.event.inputs.edition || 'server' }}"
          echo "edition=${EDITION}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            debian-archive-keyring \
            zstd

      - name: Build ISO
        run: |
          CLEAN=true ./build.sh ${{ steps.edition.outputs.edition }}

      - name: Prepare release assets
        id: prep
        run: |
          . config/distro.conf
          EDITION="${{ steps.edition.outputs.edition }}"
          ISO_FILE=$(find build/ -name '*.iso' -not -name '*.iso.*' -type f | head -1)
          if [ -z "$ISO_FILE" ]; then
            echo "ERROR: No ISO found in build/"
            ls -laR build/ || true
            exit 1
          fi
          ISO_NAME="mycloverOS-${DISTRO_VERSION}-${EDITION}-amd64.iso"
          if [ "$(basename "$ISO_FILE")" != "${ISO_NAME}" ]; then
            cp "$ISO_FILE" "build/${ISO_NAME}"
          fi
          cd build
          sha256sum "${ISO_NAME}" > "${ISO_NAME}.sha256"
          md5sum "${ISO_NAME}" > "${ISO_NAME}.md5"
          ISO_SIZE=$(du -h "${ISO_NAME}" | cut -f1)
          # Compress with zstd for GitHub Release (2 GB asset limit)
          zstd -T0 -10 "${ISO_NAME}" -o "${ISO_NAME}.zst"
          sha256sum "${ISO_NAME}.zst" > "${ISO_NAME}.zst.sha256"
          ZST_SIZE=$(du -h "${ISO_NAME}.zst" | cut -f1)
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${DISTRO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "codename=${DISTRO_CODENAME}" >> "$GITHUB_OUTPUT"
          echo "iso_size=${ISO_SIZE}" >> "$GITHUB_OUTPUT"
          echo "zst_size=${ZST_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mycloverOS-${{ steps.edition.outputs.edition }}-iso
          path: |
            build/${{ steps.prep.outputs.iso_name }}
            build/${{ steps.prep.outputs.iso_name }}.sha256
            build/${{ steps.prep.outputs.iso_name }}.md5
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}-build.{1}', steps.prep.outputs.version, github.run_number) }}
          name: "mycloverOS ${{ steps.prep.outputs.version }} (${{ steps.prep.outputs.codename }}) — ${{ steps.edition.outputs.edition }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🍀 mycloverOS ${{ steps.prep.outputs.version }} (${{ steps.prep.outputs.codename }}) — ${{ steps.edition.outputs.edition }} edition

            **Download the compressed ISO below**, decompress, and flash to USB or mount in a VM.

            ### Quick Start
            ```bash
            # Decompress the ISO
            zstd -d mycloverOS-${{ steps.prep.outputs.version }}-${{ steps.edition.outputs.edition }}-amd64.iso.zst

            # Write to USB (replace /dev/sdX with your USB device)
            sudo dd if=mycloverOS-${{ steps.prep.outputs.version }}-${{ steps.edition.outputs.edition }}-amd64.iso of=/dev/sdX bs=4M status=progress

            # Or use balenaEtcher / Rufus for a GUI option (after decompressing)
            ```

            ### What's Included
            - 🖥️ Debian Bookworm base (stable, secure, minimal)
            - 🐳 Docker CE + Compose v2 (containerized everything)
            - 🤖 Ollama AI engine (local LLM inference)
            - 🔒 WireGuard VPN mesh networking
            - 📦 CloverStack modules (NetMon, SentryLog, Vault, Chappie)
            - 🛒 CloverMarket on-device app marketplace
            - 💾 CloverNAS (ZFS storage, SMB/NFS)
            - 🌐 First-boot setup wizard (web UI on port 8080)

            ### System Requirements
            | | Minimum | Recommended |
            |---|---|---|
            | CPU | 2 cores x86_64 | 4+ cores |
            | RAM | 4 GB | 8+ GB |
            | Disk | 32 GB | 128+ GB (SSD) |
            | GPU | — | NVIDIA (for AI acceleration) |

            **ISO Size:** ${{ steps.prep.outputs.iso_size }} (compressed: ${{ steps.prep.outputs.zst_size }})

            ---
            _Your Data. Your Metal. Your Rules._ 🍀
          files: |
            build/${{ steps.prep.outputs.iso_name }}.zst
            build/${{ steps.prep.outputs.iso_name }}.zst.sha256
            build/${{ steps.prep.outputs.iso_name }}.sha256
            build/${{ steps.prep.outputs.iso_name }}.md5
