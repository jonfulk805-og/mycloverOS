# =============================================================================
# mycloverOS Distribution Configuration
# =============================================================================

# Distribution identity
DISTRO_NAME="mycloverOS"
DISTRO_VERSION="0.1.0"
DISTRO_CODENAME="seedling"
DISTRO_FULLNAME="mycloverOS ${DISTRO_VERSION} (${DISTRO_CODENAME})"

# Base distribution
BASE_DISTRO="debian"
BASE_CODENAME="bookworm"
BASE_ARCH="amd64"
BASE_MIRROR="http://deb.debian.org/debian"
BASE_SECURITY_MIRROR="http://security.debian.org/debian-security"

# Build output
BUILD_DIR="build"
ISO_LABEL="mycloverOS"
ISO_FILENAME="mycloverOS-${DISTRO_VERSION}-${BASE_ARCH}.iso"

# Editions: server, desktop, micro, kiosk
DEFAULT_EDITION="server"

# CloverStack
CLOVERSTACK_VERSION="1.0.0"
CLOVERSTACK_ROOT="/opt/cloverstack"
CLOVERSTACK_CONFIG="/etc/myclover"
CLOVERSTACK_DATA="/var/lib/cloverstack"
CLOVERSTACK_LOG="/var/log/cloverstack"

# Default enabled modules (server edition)
CLOVERSTACK_DEFAULT_MODULES="netmon sentrylog myclover-vault chappie"

# User
DEFAULT_USER="clover"
DEFAULT_HOSTNAME="cloverstack"

# Networking
ENABLE_WIREGUARD=true
ENABLE_MESH=false

# AI
ENABLE_OLLAMA=true
DEFAULT_AI_MODEL="phi3:mini"
