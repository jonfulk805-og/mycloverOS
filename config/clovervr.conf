# =============================================================================
# CloverVR Default Configuration
# VR Server / Streaming / Social VR / Content Creation
# Part of mycloverOS / CloverStack
# =============================================================================

[server]
# Web dashboard port
bind_address=0.0.0.0
web_dashboard_port=9100

# ALVR streaming port
alvr_port=9944
# WiVRn alternative port
wivrn_port=9757

[streaming]
# Default streaming quality
resolution=2880x1600
framerate=90
bitrate_mbps=100
codec=h265
# h264 (wider compat), h265 (better quality), av1 (best but slower)

# Foveated encoding (render center sharp, edges soft)
foveated_encoding=true
foveated_center_size=0.6

# Color correction
color_correction=true
brightness=1.0
contrast=1.0
saturation=1.0

[network]
# Wi-Fi 6 / 6E optimization
wifi_channel_auto=true
preferred_band=5ghz
# 5ghz or 6ghz

# QoS / traffic prioritization
qos_enabled=true
dscp_marking=46

# Dedicated VLAN (requires network config)
dedicated_vlan=false
vlan_id=100

# SRT protocol for long-distance streaming
srt_enabled=false
srt_latency_ms=120

[headsets]
# Maximum connected headsets (depends on license tier)
# player=2, studio=5, arcade=10, enterprise=unlimited
max_headsets=auto

# Auto-discovery
auto_discovery=true
discovery_broadcast=true

# Per-headset GPU encoding
per_headset_encoder=true

[social]
# Social VR (Overte-based)
enabled=true
max_users_per_room=20
spatial_audio=true
voice_chat=true
custom_avatars=true

# Default world
default_world=/opt/cloverstack/clovervr/worlds/lobby

# Avatar settings
avatar_max_polygons=50000
avatar_max_texture_size=2048

[arcade]
# Arcade / kiosk mode
enabled=false
default_timeout_minutes=30
auto_reset=true
content_library_path=/opt/cloverstack/clovervr/content

# Session billing
billing_enabled=false
billing_rate_per_minute=0.50

# Kiosk lockdown
kiosk_lockdown=true
allow_exit_to_menu=false

[training]
# Training / simulation mode (Enterprise only)
enabled=false
scorm_export=true
session_recording=true
recording_path=/var/lib/cloverstack/clovervr/recordings

# Analytics
analytics_enabled=true
analytics_dashboard=true

[content]
# Content creation tools
blender_integration=true
godot_integration=true

# 360 video
capture_360=true
capture_resolution=4096x2048
capture_framerate=60

# Import formats
import_formats=fbx,obj,gltf,glb,usd,usdz

[ai]
# Chappie / Clover AI assistant
ai_enabled=true
ai_personality=chappie
# Options: chappie, clover, custom
custom_ai_name=

# AI features
voice_commands=true
performance_tuning=true
content_moderation=false
scene_generation=false
npc_ai=false

# Ollama connection
ollama_host=127.0.0.1
ollama_port=11434
ollama_model=llama3.2

[logging]
log_level=info
log_file=/var/log/cloverstack/clovervr.log
max_log_size_mb=100
log_rotation=7
