# =============================================================================
# CloverStrike Default Configuration
# Penetration Testing & Security Audit Suite
# Part of mycloverOS / CloverStack — Enterprise Only
# =============================================================================

[server]
bind_address=0.0.0.0
web_dashboard_port=9200
api_port=9201

[scanning]
# Default scan intensity (1-5)
# 1=stealth, 2=light, 3=normal, 4=aggressive, 5=insane
default_intensity=3

# Rate limiting (packets per second)
max_rate=1000

# Timeout per host (seconds)
host_timeout=300

# Default scan types enabled
network_scan=true
web_scan=true
vuln_scan=true
wireless_scan=false

# Service detection
service_detection=true
os_detection=true
script_scanning=true

[scope]
# Scope enforcement — CRITICAL SAFETY FEATURE
# NEVER set enforce_scope=false in production
enforce_scope=true
scope_file=/etc/cloverstack/cloverstrike-scope.txt

# Exclusions (never scan these, even if in scope)
exclude_file=/etc/cloverstack/cloverstrike-exclude.txt

[vulnerability]
# OpenVAS settings
openvas_enabled=true
openvas_port=9390

# CVE database
cve_auto_update=true
cve_update_interval_hours=6

# CVSS threshold for critical alert
cvss_critical_threshold=9.0
cvss_high_threshold=7.0

[web]
# OWASP ZAP settings
zap_enabled=true
zap_port=8080

# Active scanning (more aggressive)
active_scan=true

# Spider depth
spider_max_depth=5

# API testing
api_fuzzing=true
api_formats=rest,graphql

[passwords]
# Hashcat settings
hashcat_workload=3
# 1=low, 2=default, 3=high, 4=nightmare (GPU intensive)
use_gpu=auto

# Wordlists
wordlist_dir=/opt/cloverstack/cloverstrike/wordlists
default_wordlist=rockyou.txt

# Password spray
spray_lockout_threshold=3
spray_delay_minutes=30

[phishing]
# GoPhish settings
gophish_enabled=true
gophish_port=3333
gophish_admin_port=3334

# Email sending
sending_profile=default
track_opens=true
track_clicks=true
track_submissions=true

# Campaign defaults
campaign_duration_days=14
reminder_interval_days=3

[exploit]
# Metasploit settings
metasploit_enabled=true

# Sliver C2 (advanced)
sliver_enabled=false

# Safe mode — only run verified exploits
safe_mode=true

# Sandbox testing
sandbox_enabled=true

[wireless]
# Wireless auditing
interface=wlan0
monitor_mode=false
channel_hopping=true

# Attack modes
deauth_testing=false
wpa_cracking=false
rogue_ap_detection=true

[reporting]
# Report branding
company_name=MyClover.Tech
logo_path=/opt/cloverstack/branding/logo.png
report_output_dir=/var/lib/cloverstack/cloverstrike/reports

# Report formats
output_format=pdf
include_executive_summary=true
include_technical_detail=true
include_remediation=true

# Compliance framework mapping
frameworks=pci-dss,hipaa,soc2,nist-800-53,cis-controls,nerc-cip

# Historical comparison
historical_comparison=true

[team]
# Red/Blue/Purple team mode
default_mode=red

# Blue team integration
sentrylog_integration=true
wazuh_integration=true
netmon_integration=true

# Purple team
auto_gap_analysis=true
real_time_detection_feed=true

[ai]
# Chappie / Clover AI security assistant
ai_enabled=true
ai_personality=chappie
# Options: chappie, clover, custom
custom_ai_name=

# AI capabilities
vuln_analysis=true
attack_path_mapping=true
report_narration=true
remediation_priority=true
compliance_mapping=true
live_guidance=true

# Ollama connection
ollama_host=127.0.0.1
ollama_port=11434
ollama_model=llama3.2

[safety]
# Authorization workflow
require_authorization=true
authorization_template=/opt/cloverstack/cloverstrike/templates/pentest-auth.pdf

# Audit trail (NON-DELETABLE)
audit_trail=true
audit_log=/var/log/cloverstack/cloverstrike-audit.log

# Kill switch
kill_switch_enabled=true

# Rate limiting to protect production
production_safe_mode=true
max_concurrent_scans=3

# Legal templates
legal_templates_dir=/opt/cloverstack/cloverstrike/templates/legal

[logging]
log_level=info
log_file=/var/log/cloverstack/cloverstrike.log
max_log_size_mb=100
log_rotation=30
